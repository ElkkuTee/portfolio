<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parkour Notborn</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #040814;
        --panel: rgba(15, 23, 42, 0.72);
        --border: rgba(255, 255, 255, 0.12);
        --text: #f8fafc;
        --muted: #94a3b8;
        --accent: #22d3ee;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top, rgba(34, 211, 238, 0.16), transparent 30%),
          radial-gradient(circle at bottom right, rgba(168, 85, 247, 0.18), transparent 34%),
          var(--bg);
        color: var(--text);
        font-family: Inter, system-ui, sans-serif;
        overflow: hidden;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      #page-shell {
        width: min(1440px, 100%);
      }

      #fullscreen-button {
        position: absolute;
        top: 16px;
        right: 16px;
        z-index: 3;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.72);
        color: var(--text);
        padding: 10px 16px;
        font: inherit;
        cursor: pointer;
        backdrop-filter: blur(12px);
        transition: border-color 180ms ease, background 180ms ease, opacity 180ms ease;
      }

      #fullscreen-button:hover {
        border-color: rgba(34, 211, 238, 0.5);
        background: rgba(34, 211, 238, 0.14);
      }

      #fullscreen-button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      #unity-shell {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        max-height: calc(100vh - 48px);
        margin: 0 auto;
        overflow: hidden;
        background: #000;
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
      }

      #unity-shell:fullscreen,
      #unity-shell:-webkit-full-screen {
        width: 100vw;
        height: 100vh;
        max-height: none;
        aspect-ratio: auto;
        border: 0;
        border-radius: 0;
      }

      #unity-stage {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 100%;
        height: 100%;
        transform: translate(-50%, -50%);
        overflow: hidden;
        background: #020617;
      }

      #unity-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        background: #020617;
      }

      #unity-overlay {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, rgba(2, 6, 23, 0.8), rgba(2, 6, 23, 0.45));
        z-index: 2;
        transition: opacity 220ms ease;
      }

      #unity-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .status-card {
        width: min(420px, calc(100vw - 32px));
        padding: 22px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: var(--panel);
        backdrop-filter: blur(18px);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      }

      .status-label {
        margin: 0 0 8px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .status-title {
        margin: 0;
        font-size: 28px;
        line-height: 1.1;
      }

      .status-copy {
        margin: 10px 0 18px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
      }

      .status-bar {
        width: 100%;
        height: 10px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.15);
      }

      .status-bar > span {
        display: block;
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #22d3ee, #a855f7);
        transition: width 160ms linear;
      }

      #unity-error {
        margin-top: 14px;
        color: #fda4af;
        font-size: 13px;
        line-height: 1.5;
      }

      @media (max-width: 768px) {
        body {
          padding: 12px;
        }

        #fullscreen-button {
          top: 12px;
          right: 12px;
          padding: 9px 14px;
        }
      }
    </style>
  </head>
  <body>
    <div id="page-shell">
      <div id="unity-shell">
        <div id="unity-stage">
          <button type="button" id="fullscreen-button" disabled>Fullscreen</button>
          <canvas id="unity-canvas" tabindex="-1"></canvas>
          <div id="unity-overlay">
            <div class="status-card">
              <p class="status-label">Playable WebGL Build</p>
              <h2 class="status-title">Parkour Notborn</h2>
              <p class="status-copy">
                Loading the Unity runtime. Keep this frame visible until the progress bar completes.
              </p>
              <div class="status-bar"><span id="unity-progress"></span></div>
              <div id="unity-error" hidden></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const canvas = document.getElementById('unity-canvas');
      const unityShell = document.getElementById('unity-shell');
      const unityStage = document.getElementById('unity-stage');
      const overlay = document.getElementById('unity-overlay');
      const progressBar = document.getElementById('unity-progress');
      const errorNode = document.getElementById('unity-error');
      const fullscreenButton = document.getElementById('fullscreen-button');

      let unityInstance = null;

      const buildUrl = './Build';
      const config = {
        dataUrl: buildUrl + '/parkour-notborn.data.unityweb',
        frameworkUrl: buildUrl + '/parkour-notborn.framework.js.unityweb',
        codeUrl: buildUrl + '/parkour-notborn.wasm.unityweb',
        streamingAssetsUrl: 'StreamingAssets',
        companyName: 'Portfolio',
        productName: 'Parkour Notborn',
        productVersion: '0.8',
      };

      function showError(message) {
        errorNode.hidden = false;
        errorNode.textContent = message;
      }

      function requestUnityFullscreen() {
        if (unityInstance && typeof unityInstance.SetFullscreen === 'function') {
          unityInstance.SetFullscreen(1);
        }
      }

      function resizeUnityStage() {
        const shellWidth = unityShell.clientWidth;
        const shellHeight = unityShell.clientHeight;

        if (!shellWidth || !shellHeight) {
          return;
        }

        const targetRatio = 16 / 9;
        const shellRatio = shellWidth / shellHeight;

        let stageWidth = shellWidth;
        let stageHeight = shellWidth / targetRatio;

        if (shellRatio > targetRatio) {
          stageHeight = shellHeight;
          stageWidth = shellHeight * targetRatio;
        }

        unityStage.style.width = `${stageWidth}px`;
        unityStage.style.height = `${stageHeight}px`;
      }

      fullscreenButton.addEventListener('click', requestUnityFullscreen);
      window.addEventListener('resize', resizeUnityStage);
      document.addEventListener('fullscreenchange', resizeUnityStage);
      document.addEventListener('webkitfullscreenchange', resizeUnityStage);
      resizeUnityStage();

      window.addEventListener('message', (event) => {
        if (event.origin !== window.location.origin) {
          return;
        }

        if (event.data && event.data.type === 'parkour-notborn:fullscreen') {
          requestUnityFullscreen();
        }
      });

      window.requestUnityFullscreen = requestUnityFullscreen;

      const loaderScript = document.createElement('script');
      loaderScript.src = buildUrl + '/parkour-notborn.loader.js';
      loaderScript.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBar.style.width = `${Math.round(progress * 100)}%`;
        })
          .then((instance) => {
            unityInstance = instance;
            overlay.classList.add('hidden');
            fullscreenButton.disabled = false;
            resizeUnityStage();
          })
          .catch((message) => {
            showError(message);
          });
      };
      document.body.appendChild(loaderScript);
    </script>
  </body>
</html>
